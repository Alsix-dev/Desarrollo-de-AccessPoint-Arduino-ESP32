<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/style.css">

    <title>Red Privada</title>
</head>

<body>
    <section>
        <p>Señal digital</p>
        <img id="graficaSignal" src="/grafica">
    </section>

    <section class="Bandeja">
        <p>Bandeja de mensajes</p>
        <textarea id="bandejaEntradaESP" readonly></textarea>
    </section>

    <section class="Interaccion">
        <form> <!--/Mensajeria por server.on("/Mensajeria", HTTP_GET, ...);-->
            <label>Mensaje:</label>
            <textarea id="inputEnviarMensaje" placeholder="Escribe tu comentario..." rows="6" cols="40" maxlength="500"></textarea>
            <div>
                <button onclick="enviarMensaje()">Enviar</button>
                <button>Sumbar</button>
            </div>
        </form>
    </section>

    <script>

        async function enviarMensaje(){
            const texto = document.getElementById("inputEnviarMensaje").value;

            await fetch("/enviar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: "mensaje=" + encodeURIComponent(texto)
            });

            cargarMensaje();

            document.getElementById("graficaSignal").src = "/grafica?t=" + new Date().getTime();
        }


        async function cargarMensaje(){
            const respuesta = await fetch("/mensaje");
            const texto = await respuesta.text();

            document.getElementById("bandejaEntradaESP").value = texto;
        }

        cargarMensaje();
    </script>
</body>
</html>
